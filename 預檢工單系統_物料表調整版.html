<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>預檢工單系統 — 物料表管理</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }
    table { border-collapse: collapse; width: 100%; }

    /* ===== Layout ===== */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
      color: #fff;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(30,58,138,.35);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 34px; height: 34px;
      background: rgba(255,255,255,.18);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; }
    .header-subtitle { font-size: .75rem; opacity: .75; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 16px; font-size: .8rem; opacity: .85; }
    .header-badge {
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ===== Main ===== */
    .main { padding: 20px 24px; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }

    /* ===== Stat Cards ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow .2s;
    }
    .stat-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .stat-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .stat-icon.blue   { background: #dbeafe; }
    .stat-icon.red    { background: #fee2e2; }
    .stat-icon.amber  { background: #fef3c7; }
    .stat-icon.green  { background: #dcfce7; }
    .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1; color: #0f172a; }
    .stat-label { font-size: .78rem; color: #64748b; margin-top: 3px; }
    .stat-change { font-size: .72rem; margin-top: 4px; }
    .stat-change.up   { color: #16a34a; }
    .stat-change.down { color: #dc2626; }

    /* ===== Toolbar ===== */
    .toolbar {
      background: #fff;
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 10px 8px 34px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
      background: #f8fafc;
    }
    .search-input:focus { border-color: #3b82f6; background: #fff; }
    .filter-select {
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: .82rem;
      background: #f8fafc;
      outline: none;
      color: #374151;
      cursor: pointer;
    }
    .filter-select:focus { border-color: #3b82f6; }
    .toolbar-divider { width: 1px; height: 28px; background: #e2e8f0; }
    .btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 600;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f1f5f9; color: #374151; border: 1px solid #e2e8f0; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-success { background: #dcfce7; color: #16a34a; }
    .btn-success:hover { background: #bbf7d0; }
    .btn-sm { padding: 5px 10px; font-size: .78rem; }
    .btn-icon { padding: 7px; }

    /* ===== Table Card ===== */
    .table-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .table-header {
      padding: 14px 18px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-title { font-size: .92rem; font-weight: 700; color: #0f172a; }
    .table-count { font-size: .78rem; color: #64748b; }
    .table-scroll { overflow-x: auto; }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: .78rem;
      font-weight: 700;
      color: #64748b;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
      user-select: none;
    }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { background: #f1f5f9; color: #374151; }
    thead th.sort-asc::after  { content: " ▲"; font-size: .65rem; }
    thead th.sort-desc::after { content: " ▼"; font-size: .65rem; }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
    tbody tr:hover { background: #f8fafc; }
    tbody tr:last-child { border-bottom: none; }
    td {
      padding: 11px 14px;
      font-size: .83rem;
      color: #374151;
      vertical-align: middle;
    }
    .td-part-no {
      font-family: "Courier New", monospace;
      font-size: .8rem;
      color: #1e40af;
      font-weight: 600;
    }
    .td-name { font-weight: 600; color: #0f172a; }
    .td-brand { color: #64748b; font-size: .78rem; }

    /* ===== Badges ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: .73rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    /* System badges */
    .badge-air    { background: #e0f2fe; color: #0369a1; }
    .badge-door   { background: #f3e8ff; color: #7e22ce; }
    .badge-bogie  { background: #fff7ed; color: #c2410c; }
    .badge-signal { background: #f0fdf4; color: #15803d; }
    .badge-common { background: #f1f5f9; color: #475569; }
    /* Property badges */
    .badge-spare  { background: #dbeafe; color: #1d4ed8; }
    .badge-consumable { background: #fef9c3; color: #a16207; }
    .badge-wear   { background: #ffe4e6; color: #be185d; }
    .badge-equip  { background: #f3f4f6; color: #374151; }
    /* Safety level */
    .safety-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: .78rem;
      font-weight: 700;
    }
    .safety-1 { background: #dc2626; color: #fff; }
    .safety-2 { background: #f97316; color: #fff; }
    .safety-3 { background: #eab308; color: #fff; }
    .safety-4 { background: #22c55e; color: #fff; }
    .safety-x { background: #e2e8f0; color: #64748b; }
    /* Stock status */
    .stock-wrap { display: flex; align-items: center; gap: 8px; }
    .stock-bar-bg {
      width: 60px; height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .stock-bar { height: 100%; border-radius: 3px; transition: width .4s; }
    .stock-ok   .stock-bar { background: #22c55e; }
    .stock-low  .stock-bar { background: #f59e0b; }
    .stock-crit .stock-bar { background: #ef4444; }
    .stock-text { font-weight: 700; font-size: .82rem; }
    .stock-ok   .stock-text { color: #16a34a; }
    .stock-low  .stock-text { color: #d97706; }
    .stock-crit .stock-text { color: #dc2626; }
    .stock-label { font-size: .7rem; color: #94a3b8; }
    /* Status tag */
    .status-tag { padding: 2px 8px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
    .status-ok   { background: #dcfce7; color: #15803d; }
    .status-low  { background: #fef3c7; color: #b45309; }
    .status-crit { background: #fee2e2; color: #b91c1c; }

    /* ===== Action buttons in table ===== */
    .action-group { display: flex; gap: 4px; }

    /* ===== Pagination ===== */
    .pagination {
      padding: 12px 18px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pagination-info { font-size: .78rem; color: #64748b; }
    .pagination-btns { display: flex; gap: 4px; }
    .page-btn {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      background: #fff;
      font-size: .78rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .15s;
      font-weight: 600;
      color: #374151;
    }
    .page-btn:hover   { background: #f1f5f9; }
    .page-btn.active  { background: #2563eb; color: #fff; border-color: #2563eb; }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ===== Modal ===== */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.55);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-sm { max-width: 420px; }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .modal-title { font-size: 1rem; font-weight: 700; color: #0f172a; }
    .modal-subtitle { font-size: .78rem; color: #64748b; margin-top: 3px; }
    .modal-close {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: none;
      background: #f1f5f9;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: #64748b;
      cursor: pointer;
      flex-shrink: 0;
    }
    .modal-close:hover { background: #e2e8f0; color: #374151; }
    .modal-body { padding: 20px 24px; }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ===== Form ===== */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: .78rem; font-weight: 600; color: #374151; }
    .form-label .required { color: #dc2626; }
    .form-input, .form-select, .form-textarea {
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: .83rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fafbfc;
      color: #1e293b;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
      background: #fff;
    }
    .form-input.error { border-color: #ef4444; }
    .form-error { font-size: .72rem; color: #dc2626; }
    .form-textarea { resize: vertical; min-height: 72px; }
    .form-hint { font-size: .72rem; color: #94a3b8; }

    /* ===== Section separator in form ===== */
    .form-section {
      grid-column: 1 / -1;
      font-size: .73rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding-bottom: 6px;
      border-bottom: 1px solid #f1f5f9;
      margin-top: 4px;
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: #1e293b;
      color: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .82rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 220px;
      max-width: 340px;
      animation: slideInRight .25s ease;
      pointer-events: all;
    }
    .toast.success { background: #15803d; }
    .toast.error   { background: #dc2626; }
    .toast.warning { background: #d97706; }
    @keyframes slideInRight { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-icon { font-size: 1rem; flex-shrink: 0; }

    /* ===== Empty State ===== */
    .empty-state {
      padding: 48px;
      text-align: center;
      color: #94a3b8;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-title { font-size: .92rem; font-weight: 600; color: #64748b; margin-bottom: 4px; }
    .empty-text  { font-size: .8rem; }

    /* ===== Confirm Dialog ===== */
    .confirm-icon { font-size: 2rem; text-align: center; margin-bottom: 12px; }
    .confirm-title { font-size: .95rem; font-weight: 700; text-align: center; color: #0f172a; margin-bottom: 8px; }
    .confirm-text  { font-size: .83rem; text-align: center; color: #64748b; line-height: 1.6; }

    /* ===== Detail Panel ===== */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .detail-item {}
    .detail-label { font-size: .72rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .detail-value { font-size: .85rem; color: #1e293b; font-weight: 500; }
    .detail-divider { grid-column: 1/-1; height: 1px; background: #f1f5f9; }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-grid  { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .main { padding: 14px 12px; }
      .header { padding: 0 14px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">🚆</div>
      <div>
        <div class="header-title">預檢工單系統</div>
        <div class="header-subtitle">物料表管理模組</div>
      </div>
    </div>
    <div class="header-right">
      <span class="header-badge" id="headerDate"></span>
      <span class="header-badge">操作員：維修組</span>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">📦</div>
        <div>
          <div class="stat-value" id="statTotal">—</div>
          <div class="stat-label">物料總筆數</div>
          <div class="stat-change up" id="statTotalSub"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">🚨</div>
        <div>
          <div class="stat-value" id="statCrit">—</div>
          <div class="stat-label">緊急補貨</div>
          <div class="stat-change down" id="statCritSub"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">⚠️</div>
        <div>
          <div class="stat-value" id="statLow">—</div>
          <div class="stat-label">庫存偏低</div>
          <div class="stat-change" id="statLowSub"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div>
          <div class="stat-value" id="statOk">—</div>
          <div class="stat-label">庫存充足</div>
          <div class="stat-change up" id="statOkSub"></div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="搜尋料號、名稱、廠牌、型號…" />
      </div>
      <select class="filter-select" id="filterSystem">
        <option value="">全部系統別</option>
        <option value="共通性物料">共通性物料</option>
        <option value="車門系統">車門系統</option>
        <option value="空調系統">空調系統</option>
        <option value="轉向架系統">轉向架系統</option>
        <option value="號誌通訊">號誌通訊</option>
      </select>
      <select class="filter-select" id="filterProperty">
        <option value="">全部屬性</option>
        <option value="系統備品">系統備品</option>
        <option value="消耗品">消耗品</option>
        <option value="磨耗件">磨耗件</option>
        <option value="機廠設備">機廠設備</option>
      </select>
      <select class="filter-select" id="filterStatus">
        <option value="">全部狀態</option>
        <option value="充足">庫存充足</option>
        <option value="偏低">庫存偏低</option>
        <option value="緊急補貨">緊急補貨</option>
      </select>
      <div class="toolbar-divider"></div>
      <button class="btn btn-secondary" onclick="exportCSV()">⬇ 匯出</button>
      <button class="btn btn-secondary" onclick="showImportToast()">⬆ 匯入</button>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 新增物料</button>
    </div>

    <!-- Table Card -->
    <div class="table-card">
      <div class="table-header">
        <div>
          <span class="table-title">物料清單</span>
        </div>
        <span class="table-count" id="tableCount"></span>
      </div>
      <div class="table-scroll">
        <table id="materialTable">
          <thead>
            <tr>
              <th class="sortable" data-col="partNo">料號</th>
              <th class="sortable" data-col="name">物料名稱</th>
              <th class="sortable" data-col="system">系統別</th>
              <th class="sortable" data-col="property">物料屬性</th>
              <th class="sortable" data-col="stock">庫存量</th>
              <th class="sortable" data-col="reorder">請購點</th>
              <th>庫存狀態</th>
              <th class="sortable" data-col="safety">安全等級</th>
              <th class="sortable" data-col="unitPrice">單價</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty-state" style="display:none">
        <div class="empty-icon">🔎</div>
        <div class="empty-title">找不到符合條件的物料</div>
        <div class="empty-text">請調整搜尋條件或新增物料</div>
      </div>
      <div class="pagination" id="pagination">
        <span class="pagination-info" id="pageInfo"></span>
        <div class="pagination-btns" id="pageBtns"></div>
      </div>
    </div>

  </main>
</div>

<!-- Add / Edit Modal -->
<div class="modal-backdrop" id="editModal" style="display:none" onclick="backdropClose(event,'editModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">新增物料</div>
        <div class="modal-subtitle">填寫物料基本資料，帶 * 為必填欄位</div>
      </div>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>

<script>
// ===== Data =====
var materials = [
  { id:1,  partNo:'50.88.0010.LO', name:'R134冷媒接頭',       brand:'Knorr-Bremse', model:'R134A-6FT',   spec:'適用R134a系統，6mm快接頭',           system:'空調系統',   property:'系統備品', unit:'PC', stock:18, reorder:10, unitPrice:1250, safety:'2', expiry:'不適用',         note:''                  },
  { id:2,  partNo:'50.88.0022.AC', name:'冷媒R134a',           brand:'Honeywell',    model:'Genetron134a', spec:'1kg罐裝，含回收閥',                   system:'空調系統',   property:'消耗品',  unit:'罐', stock:4,  reorder:8,  unitPrice:850,  safety:'2', expiry:'需管理效期／批號', note:'效期24個月，注意儲存溫度' },
  { id:3,  partNo:'50.12.0025.BR', name:'車門橡膠密封條',      brand:'Parker',       model:'D-SEAL-3M',    spec:'3m/條，適用MRT車門，黑色EPDM材質',    system:'車門系統',   property:'磨耗件',  unit:'條', stock:22, reorder:15, unitPrice:420,  safety:'3', expiry:'不適用',         note:''                  },
  { id:4,  partNo:'50.12.0033.DR', name:'車門驅動馬達',        brand:'Faiveley',     model:'FDM-240V',     spec:'DC24V，額定扭矩12Nm，IP67防水',       system:'車門系統',   property:'系統備品', unit:'組', stock:3,  reorder:4,  unitPrice:38500, safety:'1', expiry:'不適用',         note:'交期8週，需提前備料'   },
  { id:5,  partNo:'50.33.0018.WH', name:'轉向架軸承',          brand:'SKF',          model:'6208-2RS',     spec:'40×80×18mm，雙唇密封，適用輪軸軸箱', system:'轉向架系統', property:'磨耗件',  unit:'個', stock:12, reorder:6,  unitPrice:2800, safety:'1', expiry:'不適用',         note:''                  },
  { id:6,  partNo:'50.33.0041.BK', name:'制動來令片',          brand:'Wabtec',       model:'CLN-300A',     spec:'300×120×20mm，陶金材質，適用停車制動', system:'轉向架系統', property:'磨耗件',  unit:'片', stock:2,  reorder:8,  unitPrice:3200, safety:'1', expiry:'不適用',         note:'庫存嚴重不足，請立即採購' },
  { id:7,  partNo:'50.44.0007.SG', name:'ATP信號模組',         brand:'Alstom',       model:'ATLAS-200',    spec:'LZB/ATP車載模組，含診斷介面',         system:'號誌通訊',   property:'系統備品', unit:'個', stock:1,  reorder:2,  unitPrice:185000, safety:'1', expiry:'不適用',        note:'需原廠授權維修，備用機1台' },
  { id:8,  partNo:'50.44.0015.CB', name:'通訊電纜接頭M12',     brand:'Phoenix',      model:'SACC-M12-4',   spec:'M12 4-pin A-coded，IP67，鍍金接點',  system:'號誌通訊',   property:'消耗品',  unit:'個', stock:35, reorder:20, unitPrice:380,  safety:'3', expiry:'不適用',         note:''                  },
  { id:9,  partNo:'50.11.0003.GL', name:'玻璃清潔劑',          brand:'3M',           model:'PN38400',      spec:'500ml/瓶，無氨環保配方',               system:'共通性物料', property:'消耗品',  unit:'瓶', stock:28, reorder:12, unitPrice:95,   safety:'4', expiry:'需管理效期／批號', note:''                  },
  { id:10, partNo:'50.11.0009.LB', name:'轉向架潤滑油脂',      brand:'Molykote',     model:'BR-2-Plus',    spec:'400g筒裝，適用高負荷軸承，耐溫200°C', system:'共通性物料', property:'消耗品',  unit:'筒', stock:9,  reorder:6,  unitPrice:680,  safety:'3', expiry:'需管理效期／批號', note:'效期36個月'          },
  { id:11, partNo:'50.33.0052.SP', name:'懸吊橡膠彈簧',        brand:'ContiTech',    model:'RS-480',       spec:'480×200mm空氣彈簧，承重8噸',          system:'轉向架系統', property:'磨耗件',  unit:'個', stock:6,  reorder:4,  unitPrice:12400, safety:'2', expiry:'不適用',         note:''                  },
  { id:12, partNo:'50.12.0041.WS', name:'車窗密封膠條',        brand:'Elring',       model:'WS-MRT-B',     spec:'適用B型車窗，橫向長度1200mm',          system:'車門系統',   property:'磨耗件',  unit:'條', stock:14, reorder:8,  unitPrice:560,  safety:'4', expiry:'不適用',         note:''                  },
  { id:13, partNo:'50.88.0035.FL', name:'空調排水管',           brand:'',             model:'',             spec:'DN25，耐溫-20~120°C PVC材質',         system:'空調系統',   property:'消耗品',  unit:'公尺', stock:50, reorder:20, unitPrice:45, safety:'4', expiry:'不適用',         note:''                  },
  { id:14, partNo:'50.44.0028.PS', name:'電源供應模組24V/10A',  brand:'Mean Well',    model:'SE-240-24',    spec:'輸入AC100-240V，輸出DC24V/10A',       system:'號誌通訊',   property:'系統備品', unit:'個', stock:5,  reorder:3,  unitPrice:2850, safety:'2', expiry:'不適用',         note:''                  },
  { id:15, partNo:'50.11.0017.FF', name:'空氣濾芯',             brand:'Mann-Filter',  model:'CF810',        spec:'機廠通風系統用，過濾等級F7',           system:'共通性物料', property:'消耗品',  unit:'個', stock:7,  reorder:10, unitPrice:320,  safety:'3', expiry:'不適用',         note:'庫存低於請購點，需採購'  },
  { id:16, partNo:'50.11.0025.DS', name:'畚箕',                 brand:'',             model:'',             spec:'塑膠材質，附長柄，適用機廠清潔作業',   system:'共通性物料', property:'消耗品',  unit:'支', stock:8,  reorder:3,  unitPrice:85,   safety:'4', expiry:'不適用',         note:''                  },
];

// ===== State =====
var state = {
  search: '',
  filterSystem: '',
  filterProperty: '',
  filterStatus: '',
  sortCol: 'partNo',
  sortDir: 'asc',
  page: 1,
  pageSize: 10,
};
var nextId = 16;

// ===== Utils =====
function getStockStatus(m) {
  if (m.stock <= m.reorder)           return '緊急補貨';
  if (m.stock <= m.reorder * 2)       return '偏低';
  return '充足';
}
function getStockPct(m) {
  if (m.reorder === 0) return 100;
  var pct = (m.stock / (m.reorder * 3)) * 100;
  return Math.min(pct, 100);
}
function systemBadge(s) {
  var map = { '空調系統':'badge-air','車門系統':'badge-door','轉向架系統':'badge-bogie','號誌通訊':'badge-signal','共通性物料':'badge-common' };
  return '<span class="badge ' + (map[s]||'badge-common') + '">' + s + '</span>';
}
function propertyBadge(p) {
  var map = { '系統備品':'badge-spare','消耗品':'badge-consumable','磨耗件':'badge-wear','機廠設備':'badge-equip' };
  return '<span class="badge ' + (map[p]||'badge-spare') + '">' + p + '</span>';
}
function safetyBadge(s) {
  var cls = { '1':'safety-1','2':'safety-2','3':'safety-3','4':'safety-4' };
  return '<span class="safety-badge ' + (cls[s]||'safety-x') + '">' + (s==='0'?'—':s) + '</span>';
}
function statusTag(status) {
  var map = { '充足':'status-ok','偏低':'status-low','緊急補貨':'status-crit' };
  return '<span class="status-tag ' + (map[status]||'') + '">' + status + '</span>';
}
function stockCell(m) {
  var status = getStockStatus(m);
  var pct = getStockPct(m);
  var cls = { '充足':'stock-ok','偏低':'stock-low','緊急補貨':'stock-crit' };
  return '<div class="stock-wrap ' + (cls[status]||'') + '">'
    + '<div class="stock-bar-bg"><div class="stock-bar" style="width:' + pct + '%"></div></div>'
    + '<span class="stock-text">' + m.stock + '</span>'
    + '<span class="stock-label">' + (m.unit||'') + '</span>'
    + '</div>';
}
function fmt(n) {
  if (!n && n!==0) return '—';
  return Number(n).toLocaleString('zh-TW');
}

// ===== Filter & Sort =====
function filtered() {
  return materials.filter(function(m) {
    var q = state.search.toLowerCase();
    if (q && !(m.partNo+m.name+m.brand+m.model+m.spec).toLowerCase().includes(q)) return false;
    if (state.filterSystem   && m.system   !== state.filterSystem)   return false;
    if (state.filterProperty && m.property !== state.filterProperty) return false;
    if (state.filterStatus   && getStockStatus(m) !== state.filterStatus) return false;
    return true;
  }).sort(function(a,b) {
    var col = state.sortCol;
    var va = a[col], vb = b[col];
    if (col==='stock'||col==='reorder'||col==='unitPrice'||col==='safety') {
      va = parseFloat(va)||0; vb = parseFloat(vb)||0;
    } else {
      va = String(va||''); vb = String(vb||'');
    }
    if (va < vb) return state.sortDir==='asc' ? -1 : 1;
    if (va > vb) return state.sortDir==='asc' ?  1 : -1;
    return 0;
  });
}

// ===== Render =====
function render() {
  var rows = filtered();
  var total = rows.length;
  var pages = Math.max(1, Math.ceil(total / state.pageSize));
  if (state.page > pages) state.page = pages;
  var start = (state.page-1) * state.pageSize;
  var pageRows = rows.slice(start, start + state.pageSize);

  // stats
  var all = materials;
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statTotalSub').textContent = '已登錄 ' + all.length + ' 筆';
  var crit = all.filter(function(m){ return getStockStatus(m)==='緊急補貨'; }).length;
  var low  = all.filter(function(m){ return getStockStatus(m)==='偏低'; }).length;
  var ok   = all.filter(function(m){ return getStockStatus(m)==='充足'; }).length;
  document.getElementById('statCrit').textContent = crit;
  document.getElementById('statCritSub').textContent = crit ? '⚠ 請立即採購' : '暫無緊急品項';
  document.getElementById('statCritSub').className = 'stat-change ' + (crit ? 'down' : 'up');
  document.getElementById('statLow').textContent  = low;
  document.getElementById('statLowSub').textContent = low ? '需留意庫存動態' : '庫存水位正常';
  document.getElementById('statLowSub').className = 'stat-change ' + (low ? 'down' : '');
  document.getElementById('statOk').textContent  = ok;
  document.getElementById('statOkSub').textContent = '占比 ' + Math.round(ok/all.length*100) + '%';

  // table count
  document.getElementById('tableCount').textContent =
    '共 ' + total + ' 筆' + (total!==all.length?' (已篩選)':'');

  // sort indicators
  document.querySelectorAll('thead th').forEach(function(th) {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === state.sortCol) {
      th.classList.add(state.sortDir==='asc' ? 'sort-asc' : 'sort-desc');
    }
  });

  // body
  var tbody = document.getElementById('tableBody');
  var empty = document.getElementById('emptyState');
  if (pageRows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = pageRows.map(function(m) {
      var status = getStockStatus(m);
      return '<tr>'
        + '<td><span class="td-part-no">' + m.partNo + '</span></td>'
        + '<td><div class="td-name">' + m.name + '</div>'
        +     (m.brand ? '<div class="td-brand">' + m.brand + (m.model ? ' · ' + m.model : '') + '</div>' : '') + '</td>'
        + '<td>' + systemBadge(m.system) + '</td>'
        + '<td>' + propertyBadge(m.property) + '</td>'
        + '<td>' + stockCell(m) + '</td>'
        + '<td style="text-align:center;color:#64748b">' + m.reorder + '</td>'
        + '<td>' + statusTag(status) + '</td>'
        + '<td style="text-align:center">' + safetyBadge(m.safety) + '</td>'
        + '<td style="text-align:right;color:#374151">' + (m.unitPrice ? '$ '+fmt(m.unitPrice) : '—') + '</td>'
        + '<td><div class="action-group">'
        +   '<button class="btn btn-secondary btn-sm btn-icon" title="詳細" onclick="openDetail(' + m.id + ')">👁</button>'
        +   '<button class="btn btn-secondary btn-sm btn-icon" title="編輯" onclick="openEdit(' + m.id + ')">✏️</button>'
        +   '<button class="btn btn-danger btn-sm btn-icon" title="刪除" onclick="openDelete(' + m.id + ')">🗑</button>'
        + '</div></td>'
        + '</tr>';
    }).join('');
  }

  // pagination
  document.getElementById('pageInfo').textContent =
    '第 ' + state.page + ' / ' + pages + ' 頁，共 ' + total + ' 筆';
  var pb = document.getElementById('pageBtns');
  var btns = '';
  btns += '<button class="page-btn" onclick="goPage(' + (state.page-1) + ')" ' + (state.page<=1?'disabled':'') + '>‹</button>';
  var s = Math.max(1, state.page-2), e = Math.min(pages, s+4);
  for (var i=s; i<=e; i++) {
    btns += '<button class="page-btn' + (i===state.page?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  btns += '<button class="page-btn" onclick="goPage(' + (state.page+1) + ')" ' + (state.page>=pages?'disabled':'') + '>›</button>';
  pb.innerHTML = btns;
}

function goPage(p) {
  var rows = filtered();
  var pages = Math.max(1, Math.ceil(rows.length / state.pageSize));
  state.page = Math.max(1, Math.min(p, pages));
  render();
}

// ===== Sort =====
document.querySelectorAll('thead th.sortable').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = th.dataset.col;
    if (state.sortCol === col) {
      state.sortDir = state.sortDir==='asc' ? 'desc' : 'asc';
    } else {
      state.sortCol = col;
      state.sortDir = 'asc';
    }
    state.page = 1;
    render();
  });
});

// ===== Search & Filter =====
document.getElementById('searchInput').addEventListener('input', function(e) {
  state.search = e.target.value;
  state.page = 1;
  render();
});
document.getElementById('filterSystem').addEventListener('change', function(e) {
  state.filterSystem = e.target.value;
  state.page = 1;
  render();
});
document.getElementById('filterProperty').addEventListener('change', function(e) {
  state.filterProperty = e.target.value;
  state.page = 1;
  render();
});
document.getElementById('filterStatus').addEventListener('change', function(e) {
  state.filterStatus = e.target.value;
  state.page = 1;
  render();
});

// ===== Modal Helpers =====
function openModal(id)  { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function backdropClose(e, id) { if (e.target === e.currentTarget) closeModal(id); }

// ===== Add Modal =====
function openAddModal() {
  document.getElementById('editId').value = '';

  document.getElementById('materialForm').reset();

}

// ===== Edit Modal =====
function openEdit(id) {
  var m = materials.find(function(x){ return x.id===id; });
  if (!m) return;
  document.getElementById('editId').value   = id;
  document.getElementById('modalTitle').textContent = '編輯物料';
  document.getElementById('fPartNo').value  = m.partNo;
  document.getElementById('fName').value    = m.name;
  document.getElementById('fBrand').value   = m.brand;
  document.getElementById('fModel').value   = m.model;
  document.getElementById('fSpec').value    = m.spec;
  document.getElementById('fSystem').value  = m.system;
  document.getElementById('fProperty').value = m.property;
  document.getElementById('fUnit').value    = m.unit;
  document.getElementById('fExpiry').value  = m.expiry;
  document.getElementById('fStock').value   = m.stock;
  document.getElementById('fReorder').value = m.reorder;
  document.getElementById('fPrice').value   = m.unitPrice;
  document.getElementById('fSafety').value  = m.safety;
  document.getElementById('fNote').value    = m.note;
  openModal('editModal');
}

// ===== Submit Form =====
function submitForm(e) {
  e.preventDefault();
  var id = document.getElementById('editId').value;
  var obj = {
    partNo:    document.getElementById('fPartNo').value.trim(),
    name:      document.getElementById('fName').value.trim(),
    brand:     document.getElementById('fBrand').value.trim(),
    model:     document.getElementById('fModel').value.trim(),
    spec:      document.getElementById('fSpec').value.trim(),
    system:    document.getElementById('fSystem').value,
    property:  document.getElementById('fProperty').value,
    unit:      document.getElementById('fUnit').value.trim(),
    expiry:    document.getElementById('fExpiry').value,
    stock:     parseInt(document.getElementById('fStock').value)||0,
    reorder:   parseInt(document.getElementById('fReorder').value)||0,
    unitPrice: parseFloat(document.getElementById('fPrice').value)||0,
    safety:    document.getElementById('fSafety').value,
    note:      document.getElementById('fNote').value.trim(),
  };
  if (id) {
    var idx = materials.findIndex(function(x){ return x.id===parseInt(id); });
    if (idx>-1) { materials[idx] = Object.assign({id:parseInt(id)}, obj); }
    toast('物料「' + obj.name + '」已更新', 'success');
  } else {
    obj.id = nextId++;
    materials.unshift(obj);
    toast('已新增物料「' + obj.name + '」', 'success');
  }
  closeModal('editModal');
  state.page = 1;
  render();
}

// ===== Delete =====
var pendingDeleteId = null;
function openDelete(id) {
  var m = materials.find(function(x){ return x.id===id; });
  if (!m) return;
  pendingDeleteId = id;
  document.getElementById('deleteConfirmText').textContent =
    '確認要刪除「' + m.name + '（' + m.partNo + '）」嗎？此操作無法復原。';
  openModal('deleteModal');
}
document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
  if (!pendingDeleteId) return;
  var m = materials.find(function(x){ return x.id===pendingDeleteId; });
  materials = materials.filter(function(x){ return x.id!==pendingDeleteId; });
  pendingDeleteId = null;
  closeModal('deleteModal');
  toast('已刪除「' + (m?m.name:'物料') + '」', 'warning');
  render();
});

// ===== Detail =====
function openDetail(id) {
  var m = materials.find(function(x){ return x.id===id; });
  if (!m) return;
  var status = getStockStatus(m);
  document.getElementById('detailTitle').textContent = m.name;
  document.getElementById('detailPartNo').textContent = m.partNo;
  document.getElementById('detailEditBtn').onclick = function(){ closeModal('detailModal'); openEdit(id); };
  document.getElementById('detailContent').innerHTML =
    item('料號',     '<span style="font-family:monospace;color:#1e40af;font-weight:700">'+m.partNo+'</span>') +
    item('物料名稱', '<strong>'+m.name+'</strong>') +
    item('廠牌',     m.brand||'—') +
    item('型號',     m.model||'—') +
    '<div class="detail-divider"></div>' +
    item('系統別',   systemBadge(m.system)) +
    item('物料屬性', propertyBadge(m.property)) +
    item('單位',     m.unit||'—') +
    item('效期管理', m.expiry) +
    '<div class="detail-divider"></div>' +
    item('現有庫存', '<strong style="font-size:1.1rem">' + m.stock + '</strong> ' + (m.unit||'')) +
    item('請購點',   m.reorder + ' ' + (m.unit||'')) +
    item('庫存狀態', statusTag(status)) +
    item('安全等級', safetyBadge(m.safety)) +
    item('入庫單價', m.unitPrice ? '$ ' + fmt(m.unitPrice) : '—') +
    (m.spec ? '<div class="detail-divider"></div>' + item('規格說明', m.spec, true) : '') +
    (m.note ? item('備註',     m.note, true) : '');
  openModal('detailModal');
}
function item(label, val, full) {
  return '<div class="detail-item' + (full?' full':'') + '">'
    + '<div class="detail-label">'+label+'</div>'
    + '<div class="detail-value">'+val+'</div>'
    + '</div>';
}

// ===== Export CSV =====
function exportCSV() {
  var rows = filtered();
  var headers = ['料號','物料名稱','廠牌','型號','規格','系統別','物料屬性','單位','現有庫存','請購點','庫存狀態','安全等級','入庫單價','效期管理','備註'];
  var csv = '﻿' + headers.join(',') + '\n';
  rows.forEach(function(m) {
    var status = getStockStatus(m);
    var row = [m.partNo, m.name, m.brand, m.model, m.spec, m.system, m.property, m.unit,
               m.stock, m.reorder, status, m.safety, m.unitPrice, m.expiry, m.note];
    csv += row.map(function(v){ return '"' + String(v||'').replace(/"/g,'""') + '"'; }).join(',') + '\n';
  });
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '物料表_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('已匯出 ' + rows.length + ' 筆物料資料', 'success');
}

function showImportToast() {
  toast('匯入功能：支援辨識 Excel 欄位「物料表、淡海庫存、安坑庫存、樞紐分析表」，正式版可接批次匯入。', 'warning');
}

// ===== Toast =====
function toast(msg, type) {
  type = type || 'info';
  var icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<span class="toast-icon">' + (icons[type]||'ℹ️') + '</span>' + msg;
  var c = document.getElementById('toastContainer');
  c.appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; el.style.transition='opacity .4s'; setTimeout(function(){ c.removeChild(el); }, 400); }, 3500);
}

// ===== Header Date =====
function updateDate() {
  var now = new Date();
  var s = now.getFullYear() + '/' +
    String(now.getMonth()+1).padStart(2,'0') + '/' +
    String(now.getDate()).padStart(2,'0') + '  ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');
  document.getElementById('headerDate').textContent = s;
}
updateDate();
setInterval(updateDate, 30000);

// ===== Init =====
render();
</script>
